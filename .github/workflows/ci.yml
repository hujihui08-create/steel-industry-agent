name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run Go tests with coverage
        working-directory: backend
        run: go test ./... -coverprofile=coverage.out -covermode=atomic -v

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 7

      - name: Generate test summary
        if: always()
        working-directory: backend
        run: |
          echo "BACKEND_COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}')" >> $GITHUB_ENV
          echo "BACKEND_COVERAGE_FILE=coverage.out" >> $GITHUB_ENV

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: steel-agent-web/package-lock.json

      - name: Install dependencies
        working-directory: steel-agent-web
        run: npm ci

      - name: Run Vitest with coverage
        working-directory: steel-agent-web
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: steel-agent-web/coverage/
          retention-days: 7

      - name: Upload frontend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            steel-agent-web/test-results/
            steel-agent-web/junit.xml
          retention-days: 7
          if-no-files-found: ignore

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: steel-agent-web/package-lock.json

      - name: Install dependencies
        working-directory: steel-agent-web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: steel-agent-web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: steel-agent-web
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: steel-agent-web/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: steel-agent-web/test-results/
          retention-days: 7
          if-no-files-found: ignore

  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, e2e-test]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate test summary
        run: |
          echo "## 🧪 CI Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.backend-test.result }}" = "success" ]; then
            echo "✅ **Backend Tests**: PASSED" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.backend-test.result }}" = "failure" ]; then
            echo "❌ **Backend Tests**: FAILED" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.backend-test.result }}" = "cancelled" ]; then
            echo "⚠️ **Backend Tests**: CANCELLED" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏭️ **Backend Tests**: SKIPPED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.frontend-test.result }}" = "success" ]; then
            echo "✅ **Frontend Tests**: PASSED" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.frontend-test.result }}" = "failure" ]; then
            echo "❌ **Frontend Tests**: FAILED" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.frontend-test.result }}" = "cancelled" ]; then
            echo "⚠️ **Frontend Tests**: CANCELLED" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏭️ **Frontend Tests**: SKIPPED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.e2e-test.result }}" = "success" ]; then
            echo "✅ **E2E Tests**: PASSED" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.e2e-test.result }}" = "failure" ]; then
            echo "❌ **E2E Tests**: FAILED" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.e2e-test.result }}" = "cancelled" ]; then
            echo "⚠️ **E2E Tests**: CANCELLED" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏭️ **E2E Tests**: SKIPPED" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 **Workflow**: [${{ github.workflow }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ci-test-results
          message: |
            ## 🧪 CI Test Results

            | Suite | Status |
            |-------|--------|
            | Backend Tests | ${{ needs.backend-test.result == 'success' && '✅ PASSED' || needs.backend-test.result == 'failure' && '❌ FAILED' || needs.backend-test.result == 'cancelled' && '⚠️ CANCELLED' || '⏭️ SKIPPED' }} |
            | Frontend Tests | ${{ needs.frontend-test.result == 'success' && '✅ PASSED' || needs.frontend-test.result == 'failure' && '❌ FAILED' || needs.frontend-test.result == 'cancelled' && '⚠️ CANCELLED' || '⏭️ SKIPPED' }} |
            | E2E Tests | ${{ needs.e2e-test.result == 'success' && '✅ PASSED' || needs.e2e-test.result == 'failure' && '❌ FAILED' || needs.e2e-test.result == 'cancelled' && '⚠️ CANCELLED' || '⏭️ SKIPPED' }} |

            📋 [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
